<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=190, initial-scale=1.0, user-scalable=no">
    <title>Smartvote Limited - Fixed</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    </style>
</head>
<body style="margin:0; padding:0; width:1080px; height:190px; overflow:hidden; background-color:#b5312c; font-family:Arial, 'Helvetica Neue', sans-serif; color:#fff; box-sizing:border-box;">
    <div style="width:1080px; height:190px; position:relative; box-sizing:border-box; padding-top:8px; padding-bottom:8px;">
        <!-- Logo left: absolute like main index.html -->
        <div style="position:absolute; left:60px; top:8px; bottom:8px; width:150px; display:flex; align-items:center; justify-content:flex-start;">
            <img src="../assets/smv-logo.svg" alt="Smartvote Limited" style="height:105px; width:auto; filter:brightness(0) invert(1);">
        </div>

        <!-- Center content: absolutely centered -->
        <div style="position:absolute; top:8px; bottom:8px; left:50%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; text-align:center; max-width:520px;">
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div id="title" style="font-size:28px; font-weight:700; line-height:1; white-space:nowrap; text-shadow:0 1px 2px rgba(110,20,18,0.4);">Smartvote Limited</div>
                <div id="hkt-time" style="font-size:16px; font-weight:600; line-height:1.05; margin-top:2px; white-space:nowrap; opacity:0.95;">HKT Time: --:--:--</div>
            </div>
        </div>

        <!-- Weather + warnings right: absolute -->
        <div style="position:absolute; right:60px; top:8px; bottom:8px; width:290px; display:flex; align-items:center; gap:12px; box-sizing:border-box;">
            <!-- Warnings stacked on left -->
            <div id="warning-badges" style="display:flex; flex-direction:column; gap:3px; flex-shrink:0;">
                <!-- JS populates <img> here -->
            </div>

            <!-- Readings -->
            <div style="display:flex; flex-direction:column; gap:1px; flex-shrink:0;">
                <div style="display:flex; align-items:center; gap:4px; font-size:17px; font-weight:700; white-space:nowrap; line-height:1;">
                    <img id="wx-icon" src="https://www.hko.gov.hk/images/HKOWxIconOutline/pic60.png" alt="" style="width:22px; height:22px; flex-shrink:0;">
                    <span id="temp">--°C</span>
                </div>
                <div style="display:flex; align-items:center; gap:4px; font-size:15px; font-weight:600; white-space:nowrap; line-height:1;">
                    <img src="https://img.icons8.com/ios/50/wet.png" alt="" style="width:22px; height:22px; flex-shrink:0; filter:invert(1);">
                    <span id="humidity">--%</span>
                </div>
                <div id="uv-reading" style="display:none; align-items:center; gap:4px; font-size:15px; font-weight:600; white-space:nowrap; line-height:1;">
                    <img src="https://img.icons8.com/external-flaticons-lineal-color-flat-icons/64/external-uv-index-weather-flaticons-lineal-color-flat-icons-2.png" alt="" style="width:22px; height:22px; flex-shrink:0;">
                    <span id="uv">--</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLang = "tc";

        const translations = {
            en: { title: "Smartvote Limited", timeLabel: "HKT Time: " },
            tc: { title: "泓汛科技有限公司", timeLabel: "香港時間： " }
        };

        function pad(n) { return n.toString().padStart(2, "0"); }

        function updateTime() {
            const now = new Date();
            const hkt = new Date(now.getTime() + (now.getTimezoneOffset() + 480) * 60000);
            const hktFormatted = `${pad(hkt.getHours())}:${pad(hkt.getMinutes())}:${pad(hkt.getSeconds())}, ${pad(hkt.getDate())}/${pad(hkt.getMonth() + 1)}/${hkt.getFullYear()}`;
            const label = translations[currentLang].timeLabel;
            document.getElementById("hkt-time").textContent = label + hktFormatted;
        }

        function updateTitle() {
            document.getElementById("title").textContent = translations[currentLang].title;
        }

        function setWeather({ iconCode, temperature = "--", humidity = "--", uvIndex } = {}) {
            const iconEl = document.getElementById("wx-icon");
            if (iconCode) {
                iconEl.src = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${iconCode}.png`;
            } else {
                iconEl.src = "https://www.hko.gov.hk/images/HKOWxIconOutline/pic60.png";
            }
            document.getElementById("temp").textContent = `${temperature}°C`;
            document.getElementById("humidity").textContent = `${humidity}%`;

            const uvSpan = document.getElementById("uv");
            const uvReading = document.getElementById("uv-reading");
            if (uvIndex !== undefined && uvIndex !== null) {
                uvSpan.textContent = uvIndex;
                uvReading.style.display = "flex";
            } else {
                uvReading.style.display = "none";
            }
        }

        async function fetchWeather() {
            try {
                const r = await fetch("https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread", { cache: "no-store" });
                if (!r.ok) throw new Error("weather fetch failed");
                const data = await r.json();

                const iconCode = data.icon?.[0];
                const temperature = data.temperature?.data?.find(d => d.place === "Chek Lap Kok")?.value;
                const humidity = data.humidity?.data?.find(d => d.place === "Hong Kong Observatory")?.value;
                const uvIndex = data.uvindex?.data?.[0]?.value;

                setWeather({ iconCode, temperature, humidity, uvIndex });

                // Real warning badges (stacked, larger, match screenshot style)
                try {
                    const wr = await fetch("https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum", { cache: "no-store" });
                    const wdata = await wr.json();
                    const container = document.getElementById("warning-badges");
                    container.innerHTML = "";

                    // Map to the prominent badge-style images (Very Hot + Thunderstorm shown in your screenshot)
                    const badgeMap = [
                        { type: "WHOT", src: "https://www.hko.gov.hk/en/wxinfo/dailywx/images/vhot.gif" },
                        { type: "WTS",  src: "https://www.hko.gov.hk/en/wxinfo/dailywx/images/ts.gif" },
                        { type: "WTCSGNL", codes: { TC1: "tc1.gif", TC3: "tc3.gif", TC8NE: "tc8ne.gif", TC8SE: "tc8b.gif", TC8NW: "tc8d.gif", TC8SW: "tc8c.gif", TC9: "tc9.gif", TC10: "tc10.gif" } },
                        { type: "WRAIN", codes: { WRAINA: "raina.gif", WRAINR: "rainr.gif", WRAINB: "rainb.gif" } },
                        { type: "WFIRE", codes: { WFIREY: "firey.gif", WFIRER: "firer.gif" } }
                    ];

                    let added = 0;
                    badgeMap.forEach(item => {
                        const wd = wdata[item.type];
                        if (wd !== undefined) {
                            let src = null;
                            if (item.codes && wd.code) {
                                const f = item.codes[wd.code];
                                if (f) src = `https://www.hko.gov.hk/en/wxinfo/dailywx/images/${f}`;
                            } else if (item.src) {
                                src = item.src;
                            }
                            if (src) {
                                const img = document.createElement("img");
                                img.src = src;
                                img.alt = item.type;
                                img.style.height = "42px";
                                img.style.width = "auto";
                                img.style.display = "block";
                                img.style.borderRadius = "3px";
                                container.appendChild(img);
                                added++;
                            }
                        }
                    });

                    if (added === 0) {
                        // No warnings - optionally leave empty or show a clean state
                        container.innerHTML = "";
                    }
                } catch (_) {
                    document.getElementById("warning-badges").innerHTML = "";
                }
            } catch (e) {
                console.warn("Weather unavailable", e);
                setWeather({});
                document.getElementById("warning-badges").innerHTML = "";
            }
        }

        function toggleLang() {
            currentLang = currentLang === "tc" ? "en" : "tc";
            updateTitle();
            updateTime();
        }

        document.addEventListener("DOMContentLoaded", () => {
            updateTitle();
            updateTime();
            setInterval(updateTime, 1000);

            fetchWeather();
            setInterval(fetchWeather, 1000 * 60 * 6);

            // Cycle language every 30s
            setInterval(toggleLang, 1000 * 30);
        });
    </script>
</body>
</html>
